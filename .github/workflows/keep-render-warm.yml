name: Keep Render Warm

on:
  schedule:
    # ogni 5 minuti (GitHub può slittare, ma meglio di 10)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping bos-api /health (timeout + retry)
        run: |
          set -euo pipefail
          URL="https://bos-v6cz.onrender.com/health"

          echo "Pinging $URL"
          # 6 tentativi, max 10s ciascuno
          for i in 1 2 3 4 5 6; do
            if curl -sS --fail --max-time 10 -H "Cache-Control: no-cache" "$URL" > /dev/null; then
              echo "OK: pinged /health"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

          echo "ERROR: could not ping /health"
          exit 1
